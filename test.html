<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Our Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .contact-container { margin-top: 50px; margin-bottom: 50px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .holiday-badge { font-size: 0.9rem; margin-right: 5px; }
        #map-placeholder { height: 300px; background: #e9ecef; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container contact-container">
    <div class="row g-4">
        
        <div class="col-lg-6">
            <div class="card p-4 h-100">
                <h2 class="mb-4">Get in Touch</h2>
                <form id="contact-form">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Select Branch</label>
                        <select name="branch" class="form-select">
                            <option value="Main Branch">Main Branch (Downtown)</option>
                            <option value="North Station">North Station Branch</option>
                            <option value="West End">West End Branch</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea name="message" class="form-control" rows="4" required></textarea>
                    </div>
                    <button type="submit" id="submit-btn" class="btn btn-primary w-100">Send Message</button>
                </form>
                <div id="form-status" class="mt-3 text-center d-none"></div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card p-4 mb-4">
                <h4 class="mb-3">Find a Branch</h4>
                <div class="input-group mb-3">
                    <input type="text" id="pin-input" class="form-control" placeholder="Enter PIN Code (e.g. 110001)">
                    <button class="btn btn-outline-secondary" onclick="searchBranch()">Search</button>
                </div>
                <div id="branch-info" class="small text-muted mb-2">Search to see location details.</div>
                <div id="map-placeholder">
                    <p class="text-muted">Interactive Map View</p>
                </div>
            </div>

            <div class="card p-4">
                <h4 class="mb-3">Upcoming Holidays</h4>
                <ul class="list-group list-group-flush" id="holiday-list">
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        New Year's Day <span class="badge bg-secondary rounded-pill">Jan 01</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        Independence Day <span class="badge bg-secondary rounded-pill">Aug 15</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        Christmas <span class="badge bg-secondary rounded-pill">Dec 25</span>
                    </li>
                </ul>
            </div>
        </div>

    </div>
</div>

<script>
    // 1. FORM SUBMISSION TO GOOGLE APPS SCRIPT
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwqpCnGmDTDUbnquABb0M4fecLNUxXDxgTo02FG3f5xiXOibRfl_KnYQO8x8eMdxasj/exec'; // PASTE YOUR URL HERE
    const form = document.getElementById('contact-form');
    const status = document.getElementById('form-status');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Sending...";
        status.classList.remove('d-none', 'text-danger');
        status.classList.add('text-primary');
        status.innerText = "Submitting your message...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                status.innerText = "Success! We've received your message.";
                status.classList.replace('text-primary', 'text-success');
                form.reset();
                btn.disabled = false;
                btn.innerText = "Send Message";
            })
            .catch(error => {
                status.innerText = "Error! Please try again later.";
                status.classList.replace('text-primary', 'text-danger');
                btn.disabled = false;
            });
    });

    // 2. PIN CODE SEARCH LOGIC
    const branchData = [
        { pin: "110001", name: "Main Branch", address: "Connaught Place, Delhi", phone: "011-234567" },
        { pin: "400001", name: "West End Branch", address: "Fort, Mumbai", phone: "022-987654" }
    ];

    function searchBranch() {
        const pin = document.getElementById('pin-input').value;
        const infoDiv = document.getElementById('branch-info');
        const branch = branchData.find(b => b.pin === pin);

        if (branch) {
            infoDiv.innerHTML = `<strong>${branch.name}</strong><br>${branch.address}<br>Tel: ${branch.phone}`;
            // Logic to update map iframe src would go here
        } else {
            infoDiv.innerHTML = `<span class="text-danger">No branch found for this PIN.</span>`;
        }
    }
</script>

</body>
</html>
